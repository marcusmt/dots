# NVIDIA Core
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# Wayland Backend
env = GDK_BACKEND,wayland,x11           # Wayland first, X11 fallback
env = QT_QPA_PLATFORM,wayland;xcb       # Wayland first, XCB fallback
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# KDE Integration (since you're keeping KDE pieces)
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORMTHEME_QT6,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Cursor
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze

# NVIDIA Performance (RTX 4090 specific)
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
env = __GL_YIELD,USLEEP                 # Better CPU usage
